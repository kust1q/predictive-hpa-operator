name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./operator
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: 'operator/go.sum'
      - name: Build
        run: go build ./...
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd predictor
          pip install -r requirements.txt
          pip install pytest
      - name: Test
        run: |
          cd predictor
          # Run tests (to be created)
          pytest
