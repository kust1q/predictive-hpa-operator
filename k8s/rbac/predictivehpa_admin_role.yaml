# This rule is not used by the project predictive-hpa-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over autoscaling.predictive-hpa.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: predictive-hpa-operator
    app.kubernetes.io/managed-by: kustomize
  name: predictivehpa-admin-role
rules:
- apiGroups:
  - autoscaling.predictive-hpa.io
  resources:
  - predictivehpas
  verbs:
  - '*'
- apiGroups:
  - autoscaling.predictive-hpa.io
  resources:
  - predictivehpas/status
  verbs:
  - get
