# This rule is not used by the project predictive-hpa-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to autoscaling.predictive-hpa.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: predictive-hpa-operator
    app.kubernetes.io/managed-by: kustomize
  name: predictivehpa-viewer-role
rules:
- apiGroups:
  - autoscaling.predictive-hpa.io
  resources:
  - predictivehpas
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling.predictive-hpa.io
  resources:
  - predictivehpas/status
  verbs:
  - get
